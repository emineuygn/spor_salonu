<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT GYM CLUB | EĞİTMEN PANELİ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="egitmen.css" rel="stylesheet">
    <style>
    /* Takvim Kartlarını Beyaz Yapma */
    .trainer-class-card {
        background: #7d7676 !important; /* Arka plan bembeyaz */
        border: 1px solid #e5e7eb !important; /* Hafif gri kenarlık */
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08) !important; /* Hafif gölge */
    }

    /* Yazı renklerini siyah/koyu gri yaparak okunabilirliği artırıyoruz */
    .t-class-time {
        color: #111827 !important; /* Saat rengi koyu */
    }

    .t-class-title {
        color: #374151 !important; /* Ders ismi koyu gri */
    }

    .t-student-pill {
        background: #6d727c !important; /* Pill arka planı açık gri */
        color: #4b5563 !important; /* Pill yazısı gri */
    }

    /* Doluluk barının boş kısmını gri yapalım ki beyaz kartta belli olsun */
    .t-progress-bg {
        background: #5e626a !important;
    }

    /* Dropdown menü ikonunu koyulaştır */
    .trainer-class-card .bi-three-dots-vertical {
        color: #9ca3af !important;
    }

    /* Kartın içindeki tarih bilgisini siyah yap */
    .t-student-pill i {
        color: #6b7280 !important;
    }
</style>
</head>

<body>

    <!-- TOAST -->
    <div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index:9999"></div>

    <!-- MODAL -->
    <div class="modal fade" id="trainerModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content trainer-modal-content">
                <div id="modal-content" class="p-4"></div>
            </div>
        </div>
    </div>

    <div class="d-flex min-vh-100">

        <!-- SIDEBAR -->
        <aside class="trainer-sidebar d-flex flex-column">

            <div class="sidebar-logo">
                <div class="logo-text"><span class="logo-accent">FIT</span>GYM</div>
                <div class="logo-sub">Eğitmen Paneli</div>
            </div>

            <nav class="sidebar-nav flex-grow-1">
                <a class="tnav-item" id="nav-dashboard" onclick="loadSection('dashboard')">
                    <i class="bi bi-speedometer2 tnav-icon"></i>
                    <span>Genel Bakış</span>
                </a>

                <a class="tnav-item" id="nav-my-classes" onclick="loadSection('my-classes')">
                    <i class="bi bi-activity tnav-icon"></i>
                    <span>Derslerim</span>
                </a>

                <a class="tnav-item" id="nav-students" onclick="loadSection('students')">
                    <i class="bi bi-people tnav-icon"></i>
                    <span>Öğrencilerim</span>
                </a>

                <a class="tnav-item" id="nav-approvals" onclick="loadSection('approvals')">
                    <i class="bi bi-check-circle tnav-icon"></i>
                    <span>Onay Bekleyenler</span>
                    <span id="approval-badge" class="badge-approval ms-auto d-none"></span>
                </a>

                <a class="tnav-item" id="nav-schedule" onclick="loadSection('schedule')">
                    <i class="bi bi-calendar3 tnav-icon"></i>
                    <span>Takvim</span>
                </a>

                <div class="pt-2">
                    <a class="tnav-item tnav-highlight" onclick="openAddClassModal()">
                        <i class="bi bi-plus-circle tnav-icon"></i>
                        <span>Yeni Ders Ekle</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="d-flex align-items-center gap-2 mb-2">
                    <div id="profile-avatar" class="trainer-avatar">E</div>

                    <div class="flex-grow-1 overflow-hidden">
                        <div id="profile-name" class="sidebar-user-name">Eğitmen</div>
                        <div id="today-count" class="sidebar-user-role">Yükleniyor...</div>
                    </div>

                    <button onclick="logout()" class="btn-logout-icon" title="Çıkış Yap">
                        <i class="bi bi-box-arrow-left"></i>
                    </button>
                </div>
            </div>

        </aside>

        <!-- MAIN -->
        <main class="flex-grow-1 trainer-main">

            <header class="trainer-topbar d-flex align-items-center justify-content-between px-4">
                <h1 id="section-title" class="topbar-title mb-0"></h1>

                <div id="toolbar" class="d-none d-flex align-items-center gap-2">
                    <div class="search-wrapper">
                        <i class="bi bi-search search-icon"></i>
                        <input 
                            id="search-input" 
                            type="text" 
                            placeholder="Ders ara..."
                            class="search-input" 
                            oninput="debounceSearch()"
                        >
                    </div>

                    <input 
                        id="date-filter" 
                        type="date" 
                        class="date-input" 
                        onchange="loadMyClasses()"
                    >
                </div>
            </header>

            <div class="p-4">

                

                <section id="dynamic-content" class="min-content">
                    <div class="d-flex align-items-center justify-content-center" style="height:300px">
                        <div class="text-muted fst-italic">Yükleniyor...</div>
                    </div>
                </section>

            </div>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="egitmen.js"></script>

</body>
</html>

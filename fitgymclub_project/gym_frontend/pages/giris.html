<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FIT GYM CLUB | ÜYE GİRİŞİ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        :root { --lime: #c3f400; }
        * { box-sizing: border-box; }
        body { background-color: #0e0e0e; color: #e5e2e1; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; }

        /* Navbar */
        .top-navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(9,9,11,0.7); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            height: 72px; display: flex; align-items: center; padding: 0 2rem;
            justify-content: space-between;
        }
        .nav-logo { font-size: 1.25rem; font-weight: 900; font-style: italic; color: #fff; letter-spacing: -0.05em; text-decoration: none; }
        .nav-logo span { color: var(--lime); }

        /* Layout */
        .auth-wrapper { display: flex; min-height: 100vh; padding-top: 72px; }

        /* Sol Panel */
        .auth-image-side {
            display: none;
            width: 50%;
            position: relative;
            overflow: hidden;
        }
        @media (min-width: 992px) { .auth-image-side { display: flex; } }

        .auth-image-side img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .auth-image-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to right, rgba(14,14,14,0.85) 0%, rgba(14,14,14,0.3) 100%);
        }
        .auth-image-content { position: relative; z-index: 10; padding: 4rem; display: flex; flex-direction: column; justify-content: flex-end; height: 100%; }

        /* Sağ Panel */
        .auth-form-side {
            width: 100%;
            display: flex; align-items: center; justify-content: center;
            padding: 2rem;
        }
        @media (min-width: 992px) { .auth-form-side { width: 50%; } }

        .auth-form-inner { width: 100%; max-width: 420px; }

        /* Form */
        .form-label-custom {
            display: block; font-size: 0.65rem; font-weight: 700;
            letter-spacing: 0.18em; text-transform: uppercase; color: #71717a; margin-bottom: 0.5rem;
        }

        .form-control-custom {
            width: 100%; background: #2a2a2a; border: none; border-radius: 0.625rem;
            padding: 1rem 1.25rem; color: #fff; font-size: 0.9375rem; outline: none;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .form-control-custom:focus { background: #3a3939; box-shadow: 0 0 0 2px rgba(195,244,0,0.2); }
        .form-control-custom::placeholder { color: #52525b; }

        .input-wrapper { position: relative; }
        .input-icon {
            position: absolute; right: 1.25rem; top: 50%; transform: translateY(-50%);
            color: #52525b; font-size: 1rem; pointer-events: none;
        }

        .btn-lime {
            width: 100%; background: var(--lime); color: #283500;
            font-weight: 900; font-size: 0.8125rem; letter-spacing: 0.12em;
            text-transform: uppercase; padding: 1.1rem; border: none;
            border-radius: 0.625rem; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-lime:hover { filter: brightness(1.08); transform: translateY(-1px); }
        .btn-lime:active { transform: scale(0.98); }
        .btn-lime:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Divider */
        .auth-divider { border-color: rgba(255,255,255,0.08) !important; }

        /* Footer */
        .auth-footer {
            background: #0e0e0e; border-top: 1px solid rgba(255,255,255,0.05);
            padding: 1.5rem 3rem;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<header class="top-navbar">
    <a href="../index.html" class="nav-logo">FIT<span>GYM</span></a>
</header>

<div class="auth-wrapper">

    <!-- Sol: Görsel -->
    <div class="auth-image-side">
        <img alt="High Performance Gym"
             src="https://lh3.googleusercontent.com/aida-public/AB6AXuCz4ymFoFUyLkagOOYL-LWeMWJOuJkql_SEEy23cMEEp4KRWBBTfirV-jFlK2dC-3QQo0y1Ga9LsrRNh6K6hxXAs3L2h4aw1W0NpVz9Cz6miGyuW1ZiM7DX6kQ8U4t8ApVXThJPU5jQgGvtSJhncvKGpg2vwWksoUwu50TqUFYHpwUB0EJx20LQaanNuz5lDD0BDOmsv2HSsrHQF19HWzUAizKSGcQelfqR1kTSkuR96y0dixuThxDh_VgxJGJXDWCNO1SNGGjYNQmp"/>
        <div class="auth-image-overlay"></div>
        <div class="auth-image-content">
            <span style="color:var(--lime);font-weight:900;letter-spacing:.3em;font-size:.75rem;text-transform:uppercase;margin-bottom:1rem;display:block">KİNETİK VAULT</span>
            <h1 style="color:#fff;font-size:5rem;font-weight:900;line-height:.9;letter-spacing:-.05em;margin-bottom:2rem">FIT<br/>GYM<br/>CLUB</h1>
            <p style="color:#71717a;max-width:400px;font-size:1.0625rem;line-height:1.6">
                Sınırlarını aşmak için tasarlandı. KINETIC performans dünyasına hoş geldiniz.
            </p>
        </div>
    </div>

    <!-- Sağ: Form -->
    <div class="auth-form-side">
        <div class="auth-form-inner">

            <div style="margin-bottom:3rem">
                <h2 style="color:#fff;font-size:2.75rem;font-weight:900;letter-spacing:-.05em;text-transform:uppercase;margin-bottom:1rem">ÜYE GİRİŞİ</h2>
                <div style="height:3px;width:80px;background:var(--lime);border-radius:2px"></div>
            </div>

            <form id="loginForm">
                <!-- Email -->
                <div style="margin-bottom:1.75rem">
                    <label class="form-label-custom" for="email">E-POSTA</label>
                    <div class="input-wrapper">
                        <input class="form-control-custom" id="email" name="email"
                               placeholder="isim@örnek.com" required type="email"/>
                        <i class="bi bi-at input-icon"></i>
                    </div>
                </div>

                <!-- Şifre -->
                <div style="margin-bottom:1.75rem">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="form-label-custom mb-0" for="sifre">ŞİFRE</label>
                        <a href="#" style="font-size:.65rem;color:#52525b;text-decoration:none;text-transform:uppercase;letter-spacing:.1em">Şifremi Unuttum</a>
                    </div>
                    <div class="input-wrapper">
                        <input class="form-control-custom" id="sifre" name="sifre"
                               placeholder="••••••••" required type="password"/>
                        <i class="bi bi-lock input-icon"></i>
                    </div>
                </div>

                <!-- Mesaj -->
                <div id="message" style="font-size:.875rem;font-weight:600;min-height:1.5rem;margin-bottom:1rem"></div>

                <button class="btn-lime" type="submit" id="submit-btn">
                    GİRİŞ YAP <i class="bi bi-arrow-right"></i>
                </button>
            </form>

            <hr class="auth-divider my-4">

            <div class="d-flex align-items-center justify-content-between">
                <span style="color:#71717a;font-size:.875rem">Henüz üye değil misin?</span>
                <a href="kayit.html" style="color:var(--lime);font-weight:700;font-size:.875rem;text-decoration:none">
                    HEMEN KATIL <i class="bi bi-lightning-charge-fill"></i>
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="auth-footer d-flex flex-column flex-md-row justify-content-between align-items-center">
    <span style="color:var(--lime);font-size:.625rem;text-transform:uppercase;letter-spacing:.2em;font-weight:700">
        © 2026 KINETIC PERFORMANCE VAULT. TÜM HAKLARI SAKLIDIR.
    </span>
    <div class="d-flex gap-4 mt-3 mt-md-0">
        <a href="#" style="color:#3f3f46;font-size:.625rem;text-transform:uppercase;letter-spacing:.2em;font-weight:700;text-decoration:none">GİZLİLİK</a>
        <a href="#" style="color:#3f3f46;font-size:.625rem;text-transform:uppercase;letter-spacing:.2em;font-weight:700;text-decoration:none">KOŞULLAR</a>
        <a href="#" style="color:#3f3f46;font-size:.625rem;text-transform:uppercase;letter-spacing:.2em;font-weight:700;text-decoration:none">ÜYELİK</a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
